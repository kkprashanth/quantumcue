events {}

http {
    # Hide nginx version and reduce info leakage
    server_tokens off;

    # Basic security headers (add more from app if you prefer)
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Optional: simple rate limiting
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name api.quantumcue.app;

        # Redirect everything HTTP → HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
       	http2 on;
        server_name api.quantumcue.app;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Reasonable TLS/security settings (tune as needed)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # HSTS (enable only after you're sure HTTPS works everywhere)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Apply rate limiting to all API requests (uncomment if used above)
        # limit_req zone=api_limit burst=20 nodelay;

        location / {
            proxy_pass http://orchestrator:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts to avoid hanging upstream connections
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;

            # Disable buffering if you stream responses
            # proxy_buffering off;
        }
    }
}

