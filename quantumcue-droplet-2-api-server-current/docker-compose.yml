services:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    # user: "101:1002"                 # nginx(101) : quantumcue(1002)
    # group_add:
    #  - quantumcue                   # Extra group perms
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx-cache:/var/cache/nginx     # NEW
      - nginx-run:/var/run               # NEW  
      - nginx-log:/var/log/nginx         # NEW (logs)
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - internal_net
    depends_on:
      orchestrator:
        condition: service_healthy
    restart: unless-stopped

  orchestrator:
    build: ./orchestrator
    container_name: orchestrator
    expose:
      - "8000"
    networks:
      - internal_net
    volumes:
      - orchestrator-cache:/app/cache_quantum  # Persistent joblib cache
    env_file:
      - ./orchestrator/.env
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]  
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - qdvi

  qdvi:
    build: ./qdvi
    container_name: qdvi
    expose:
      - "3000"  
    networks:
      - internal_net
    volumes:
      - qdvi-cache:/app/cache  # Named volume, persists restarts
    env_file:
      - ./qdvi/.env
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"] 
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  internal_net:
    driver: bridge
    internal: false 

volumes:
  orchestrator-cache:
  qdvi-cache:
  nginx-cache:
  nginx-run: 
  nginx-log:
