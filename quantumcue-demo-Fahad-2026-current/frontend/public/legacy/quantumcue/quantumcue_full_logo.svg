<svg width="320" height="60" viewBox="0 0 320 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-text { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-weight: 700; fill: #102a43; }
      .tagline-text { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-weight: 400; fill: #102a43; }
    </style>
  </defs>
  <!-- QuantumCue Text - dark blue, bold, centered -->
  <text x="160" y="28" class="logo-text" font-size="28" letter-spacing="-0.3" text-anchor="middle">QuantumCue</text>
  
  <!-- Tagline - dark blue, lighter weight, centered -->
  <text x="160" y="50" class="tagline-text" font-size="13" text-anchor="middle">
    Quantum connected. AI accelerated.
    <tspan font-size="10" baseline-shift="super">™</tspan>
  </text>
</svg>
